[workflow]
persistent_facts = [
  "file:{project-root}/docs/project-context.md",
  "file:{project-root}/CLAUDE.md",
  "file:{project-root}/apps/api/CLAUDE.md",
  "file:{project-root}/apps/web/CLAUDE.md",
  "file:{project-root}/docs/architecture-api.md",
  "file:{project-root}/docs/architecture-web.md",
  "GATE TRUOC KHI CODE (bat buoc): story PHAI co validation/readiness report da duyet — file _bmad-output/planning-artifacts/implementation-readiness-report-*.md (tu bmad-check-implementation-readiness) HOAC validation-report-*.md (tu bmad-testarch-trace), sinh ra trong /story-ready. KHONG tim thay report cho story nay, HOAC status = NOT READY -> DUNG, khong viet code, yeu cau user chay /story-ready <story> truoc roi quay lai. Chi bo qua gate khi user noi ro 'bo qua validation' cho story do.",
  "Mirror existing patterns: doc file lan can truoc khi viet; KHONG tu che pattern moi khi repo da co. Rule trong CLAUDE.md/project-context.md thang convention generic cua BMAD.",
