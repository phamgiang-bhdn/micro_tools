upstream dealvault_api {
    server api:4000;
}

upstream dealvault_web {
    server web:3100;
}

# Đặt DOMAIN của bạn vào các chỗ <YOUR_DOMAIN> bên dưới rồi reload nginx.
# Sau khi cert được cấp, mở khối server 443 và bật redirect.

server {
    listen 80;
    server_name <YOUR_DOMAIN> www.<YOUR_DOMAIN>;

    # ACME challenge cho Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Sau khi có cert, uncomment dòng dưới để force HTTPS
    # return 301 https://$host$request_uri;

    location /api/ {
        proxy_pass http://dealvault_api/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://dealvault_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

