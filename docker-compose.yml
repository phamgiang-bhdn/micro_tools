version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: affiliate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: affiliate_admin
      POSTGRES_PASSWORD: affiliate_password
      POSTGRES_DB: affiliate_platform
    ports:
      - "6432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U affiliate_admin -d affiliate_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: affiliate-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # pgAdmin validates email; .local domains are rejected and the container will restart forever.
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin_password
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
